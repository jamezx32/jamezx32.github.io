<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <style>
      .title { font: 700 20px Helvetica, Arial, sans-serif; fill: #ffffff; }
      .field { font: 500 18px Helvetica, Arial, sans-serif; fill: #101828; }
      .note { font: 500 14px Helvetica, Arial, sans-serif; fill: #475467; }
      .mini { font: 500 13px Helvetica, Arial, sans-serif; fill: #344054; }
      .callout { font: 600 16px Helvetica, Arial, sans-serif; fill: #0c111d; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0b7285"/>
    </marker>
  </defs>

  <rect width="980" height="430" fill="#ffffff"/>
  <text x="40" y="30" class="note">A simplified view of a JSArray whose elements are object references</text>

  <g transform="translate(40 88)">
    <rect width="300" height="228" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="300" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="300" height="12" fill="#0b7285"/>
    <text x="150" y="28" text-anchor="middle" class="title">JSArray</text>

    <rect x="18" y="62" width="264" height="38" rx="8" fill="#eef4f7"/>
    <rect x="18" y="108" width="264" height="38" rx="8" fill="#fff7ed" stroke="#f79009" stroke-width="1.5"/>
    <rect x="18" y="154" width="264" height="38" rx="8" fill="#d9f0ff" stroke="#53b1fd" stroke-width="1.5"/>
    <rect x="18" y="200" width="264" height="30" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="1.5"/>

    <text x="36" y="86" class="field">map</text>
    <text x="36" y="132" class="field">properties</text>
    <text x="36" y="178" class="field">elements pointer</text>
    <text x="36" y="221" class="field">length</text>
  </g>

  <g transform="translate(456 66)">
    <rect width="270" height="272" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="270" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="270" height="12" fill="#0b7285"/>
    <text x="135" y="28" text-anchor="middle" class="title">FixedArray</text>

    <rect x="18" y="62" width="234" height="40" rx="8" fill="#eef4f7"/>
    <rect x="18" y="110" width="234" height="44" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="1.5"/>
    <rect x="18" y="162" width="234" height="44" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="1.5"/>
    <rect x="18" y="214" width="234" height="40" rx="8" fill="#eef4f7"/>

    <text x="36" y="88" class="field">map / header</text>
    <text x="36" y="138" class="field">element[0]  ref -&gt; obj0</text>
    <text x="36" y="190" class="field">element[1]  ref -&gt; obj1</text>
    <text x="36" y="240" class="field">...</text>
  </g>

  <g transform="translate(792 94)">
    <rect width="148" height="104" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="148" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="148" height="12" fill="#0b7285"/>
    <text x="74" y="28" text-anchor="middle" class="title">obj0</text>
    <text x="28" y="84" class="field">{x: 1}</text>
  </g>

  <g transform="translate(792 232)">
    <rect width="148" height="104" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="148" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="148" height="12" fill="#0b7285"/>
    <text x="74" y="28" text-anchor="middle" class="title">obj1</text>
    <text x="28" y="84" class="field">{y: 2}</text>
  </g>

  <line x1="340" y1="176" x2="456" y2="176" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="726" y1="138" x2="792" y2="146" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="726" y1="190" x2="792" y2="284" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="320" y="352" width="360" height="44" rx="10" fill="#f5fbff" stroke="#53b1fd" stroke-width="1.5"/>
  <text x="500" y="379" text-anchor="middle" class="callout">array slots hold references, not object bodies inline</text>
</svg>
