<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <style>
      .title { font: 700 20px Helvetica, Arial, sans-serif; fill: #ffffff; }
      .label { font: 600 18px Helvetica, Arial, sans-serif; fill: #101828; }
      .note { font: 500 14px Helvetica, Arial, sans-serif; fill: #475467; }
      .mini { font: 500 13px Helvetica, Arial, sans-serif; fill: #344054; }
      .callout { font: 600 16px Helvetica, Arial, sans-serif; fill: #0c111d; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0b7285"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#ffffff"/>
  <text x="42" y="32" class="note">A simplified path for ordinary objects across V8 heap spaces</text>

  <g transform="translate(42 108)">
    <rect width="148" height="96" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="148" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="148" height="12" fill="#0b7285"/>
    <text x="74" y="28" text-anchor="middle" class="title">Allocate</text>
    <text x="26" y="84" class="label">new object</text>
  </g>

  <g transform="translate(252 82)">
    <rect width="196" height="148" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="196" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="196" height="12" fill="#0b7285"/>
    <text x="98" y="28" text-anchor="middle" class="title">New Space</text>

    <rect x="18" y="62" width="72" height="54" rx="8" fill="#d9f0ff" stroke="#53b1fd" stroke-width="1.5"/>
    <rect x="106" y="62" width="72" height="54" rx="8" fill="#d9f0ff" stroke="#53b1fd" stroke-width="1.5"/>
    <text x="54" y="92" text-anchor="middle" class="label">From</text>
    <text x="142" y="92" text-anchor="middle" class="label">To</text>
    <text x="18" y="132" class="mini">young generation / minor GC</text>
  </g>

  <g transform="translate(510 108)">
    <rect width="148" height="96" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="148" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="148" height="12" fill="#0b7285"/>
    <text x="74" y="28" text-anchor="middle" class="title">Minor GC</text>
    <text x="28" y="84" class="label">check survivors</text>
  </g>

  <g transform="translate(740 56)">
    <rect width="180" height="104" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="180" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="180" height="12" fill="#0b7285"/>
    <text x="90" y="28" text-anchor="middle" class="title">Reclaim</text>
    <text x="36" y="84" class="label">dies young</text>
  </g>

  <g transform="translate(726 212)">
    <rect width="194" height="116" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="194" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="194" height="12" fill="#0b7285"/>
    <text x="97" y="28" text-anchor="middle" class="title">Old Space</text>
    <rect x="18" y="62" width="158" height="40" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="1.5"/>
    <text x="36" y="88" class="label">promoted survivors</text>
  </g>

  <g transform="translate(92 280)">
    <rect width="214" height="92" rx="12" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
    <rect width="214" height="42" rx="12" fill="#0b7285"/>
    <rect y="30" width="214" height="12" fill="#0b7285"/>
    <text x="107" y="28" text-anchor="middle" class="title">Large Object Space</text>
    <text x="24" y="84" class="label">large objects may land here directly</text>
  </g>

  <g transform="translate(364 280)">
    <rect width="250" height="92" rx="12" fill="#f5fbff" stroke="#53b1fd" stroke-width="1.5"/>
    <text x="125" y="34" text-anchor="middle" class="callout">Side paths</text>
    <text x="24" y="58" class="mini">code objects -&gt; Code Space</text>
    <text x="24" y="78" class="mini">shared immutable structures -&gt; Read-Only Space</text>
  </g>

  <line x1="190" y1="156" x2="252" y2="156" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="448" y1="156" x2="510" y2="156" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="658" y1="146" x2="740" y2="108" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="658" y1="170" x2="726" y2="246" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="116" y1="204" x2="116" y2="280" stroke="#0b7285" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="308" y="22" width="364" height="44" rx="10" fill="#ecfdf3" stroke="#12b76a" stroke-width="1.5"/>
  <text x="490" y="49" text-anchor="middle" class="callout">Most ordinary objects die in the young generation</text>
</svg>
