site_name: SXY Research Notes
site_url: https://jamezx32.github.io/
site_description: JavaScript Engine Security Research Notes
site_author: SXY

exclude_docs: |
  jsc/CVE-2024-23222复现笔记框架.md

theme:
  name: material
  language: zh
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css?v=2026-05-07-v49

nav:
  - 首页: index.md
  - V8:
      - 总览: v8/index.md
      - JIT基础: v8/jit.md
      - V8调试手册: v8/V8调试手册.md
      - V8 数组的内存布局: v8/V8 数组的内存布局.md
      - V8 堆的内存布局: v8/V8堆的内存布局.md
      - V8 指针压缩机制: v8/V8指针压缩机制.md
      - CVE-2021-30517分析: v8/CVE-2021-30517分析.md
      - CVE-2025-13224分析: v8/CVE-2025-13224分析.md
      - CVE-2025-12433分析: v8/CVE-2025-12433分析.md
  - JSC:
      - 总览: jsc/index.md
      - 调试参数: jsc/JavaScriptCore调试参数.md
      - Linux 编译要点: jsc/JavaScriptCore Linux编译.md
      - NAN-Boxing: jsc/JavaScriptCore NAN-Boxing.md
      - Root Cause分析要点: jsc/JavaScriptCore Root Cause分析要点.md
      - CVE-2024-23222分析: jsc/CVE-2024-23222分析.md
  - ChakraCore:
      - 总览: chakracore/index.md
      - ChakraCore 构建与调试: chakracore/ChakraCore构建与调试.md
      - CVE-2019-0567分析: chakracore/CVE-2019-0567.md
  - VSCode配置:
      - clangd配置: vscode/clangd-setup.md

copyright: |
  © 2025 SXY Research Notes · Built for research and portfolio

extra:
  generator: false

extra_javascript:
  - javascripts/extra.js?v=2026-05-07-v49
